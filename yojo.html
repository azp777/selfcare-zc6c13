// ひらがな→カタカナ、全角化して部分一致しやすく
function norm(s){if(!s)return"";s=s.toLowerCase();
  s=s.replace(/[ぁ-ゖ]/g,function(c){return String.fromCharCode(c.charCodeAt(0)+0x60);}); // ひら→カタ
  s=s.replace(/[！-～]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-0xfee0);}); // 全角英数→半角
  return s.replace(/\s|・|ー|-/g,"");}
function match(hay,q){q=norm(q);if(!q)return true;return norm(hay).indexOf(q)>=0;}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

var favOnly=false;

function renderKampoBody(){
  document.querySelectorAll("#kampoTags .tag").forEach(function(b){b.classList.toggle("on",b.textContent===kampoTag);});
  var q=(document.getElementById("kampoQ")||{}).value||"";
  var list=KAMPO.filter(function(k){
    if(favOnly&&state.fav.kampo.indexOf(k.n)<0)return false;
    if(kampoTag&&k.tags.indexOf(kampoTag)<0)return false;
    if(!q)return true;
    if(match(k.n,q)||match(k.y,q)||match(k.one,q)||match(k.eff,q))return true;
    return k.tags.some(function(t){return match(t,q);});
  });
  var box=document.getElementById("kampoList");
  if(!list.length){box.innerHTML='<div class="empty">該当する処方が見つかりませんでした。</div>';return;}
  box.innerHTML=list.map(kampoCard).join("");
}

var checkSel=[];
function toggleCheck(n){
  var i=checkSel.indexOf(n);

function renderCheck(){
  var sr=document.getElementById("checkSel");
  if(!checkSel.length){sr.innerHTML='<span style="font-size:12px;color:var(--sub)">まだ選ばれていません</span>';}
  else{sr.innerHTML=checkSel.map(function(n){
    return '<span class="selpill">'+esc(n)+'<button onclick="toggleCheck(\''+n+'\')">×</button></span>';}).join("");}
  var kz=[],mo=[],da=[],bu=[];
  checkSel.forEach(function(n){
    var k=KAMPO.find(function(x){return x.n===n;});if(!k)return;
    var sy=KAMPO_SY[n]||[];
    if(k.kz||sy.indexOf("甘草")>=0)kz.push(n);

    if(sy.indexOf("大黄")>=0||(k.sp||"").indexOf("大黄")>=0)da.push(n);
    if(sy.indexOf("附子")>=0)bu.push(n);
  });
  var out="";

var tsuboTag="";
function toggleTsuboTag(t){tsuboTag=(tsuboTag===t)?"":t;renderTsuboBody();}
function renderTsubo(){
  var v=document.getElementById("touyouBody");
  v.innerHTML='<div class="card"><h2>🩹 ツボ（経穴）とかんたん養生法</h2>'
   +'<p class="lead">伝統的に親しまれてきたツボと、道具のいらない養生法をまとめました。医療的な治療ではなく、日々のセルフケアの目安です。</p>'
   +'<div class="caution">⚠️ <b>妊娠中の方へ</b>：<b>三陰交・合谷・肩井</b>など（🤰マーク）は刺激を避けるとよいとされます。妊娠中・持病のある方・体調が悪い時は強い刺激を避け、心配な時は専門家にご相談を。強い痛み・しびれ・炎症がある部位は押さないでください。</div>'
   +'<input class="search" id="tsuboQ" placeholder="ツボ名・悩みで検索（例: ごうこく / かたこり / ふみん）" oninput="renderTsuboBody()">'
   +'</div>'
   +'<div class="sectlabel">悩みから逆引き（タップで絞り込み）</div>'
   +'<div class="tagrow" id="tsuboTags"></div>'
   +'<div id="tsuboList"></div>'
   +'<div class="sectlabel">🧘 かんたん養生法（道具いらず）</div>'
   +'<div id="yojohoList"></div>';
  document.getElementById("tsuboTags").innerHTML=TSUBO_TAGS.map(function(t){
    return '<button class="tag" onclick="toggleTsuboTag(\''+t+'\')">'+t+'</button>';}).join("");
  document.getElementById("yojohoList").innerHTML=YOJOHO.map(function(y){
    return '<div class="item open"><div class="h"><div><span class="nm">'+esc(y.n)+'</span></div></div>'
     +'<div class="body" style="display:block"><div class="kv">'+esc(y.how)+'</div>'
     +(y.cau?'<div class="caution">🔸 '+esc(y.cau)+'</div>':'')+'</div></div>';
  }).join("");
  renderTsuboBody();
}
function renderTsuboBody(){
  document.querySelectorAll("#tsuboTags .tag").forEach(function(b){b.classList.toggle("on",b.textContent===tsuboTag);});
  var q=(document.getElementById("tsuboQ")||{}).value||"";
  var list=TSUBO.filter(function(k){
    if(tsuboTag&&k.tags.indexOf(tsuboTag)<0)return false;
    if(!q)return true;
    if(match(k.n,q)||match(k.y,q)||match(k.loc,q))return true;
    return k.tags.some(function(t){return match(t,q);});
  });
  var box=document.getElementById("tsuboList");
  if(!list.length){box.innerHTML='<div class="empty">該当するツボが見つかりませんでした。</div>';return;}
  box.innerHTML=list.map(function(k){
    var tg=k.tags.map(function(t){return '<span class="minitag">'+t+'</span>';}).join("");
    var preg=(k.cau&&k.cau.indexOf("妊娠")>=0);
    return '<div class="item open"><div class="h"><div><span class="nm">'+(preg?'🤰 ':'')+esc(k.n)+'</span> <span class="yomi">'+esc(k.y)+'</span></div></div>'
     +'<div class="body" style="display:block">'
     +'<div class="kv"><b>場所：</b>'+esc(k.loc)+'</div>'
     +'<div class="kv"><b>押し方：</b>'+esc(k.press)+'</div>'
     +'<div class="tags">'+tg+'</div>'
     +(k.cau?'<div class="caution">⚠️ '+esc(k.cau)+'</div>':'')
     +'</div></div>';
  }).join("");
}
function renderRecipe(){
  var v=document.getElementById("touyouBody");
  v.innerHTML='<div class="card"><h2>🍵 薬膳茶・スープの組み合わせ</h2>'
   +'<p class="lead">身近な薬膳の食材でつくる、かんたんな組み合わせです。効能を約束するものではなく「〜したい時に親しまれてきた」お茶・スープのメモです。「薬膳」タブの食材とあわせてどうぞ。</p>'
   +'<input class="search" id="recipeQ" placeholder="材料・気分で検索（例: しょうが / ひえ / のど）" oninput="renderRecipeBody()">'
   +'</div><div id="recipeList"></div>';
  renderRecipeBody();
}
function renderRecipeBody(){
  var q=(document.getElementById("recipeQ")||{}).value||"";
  var list=RECIPE.filter(function(r){return match(r.n,q)||match(r.ing,q)||match(r.when,q);});
  var box=document.getElementById("recipeList");
  if(!list.length){box.innerHTML='<div class="empty">該当が見つかりませんでした。</div>';return;}
  box.innerHTML=list.map(function(r){
    return '<div class="item open"><div class="h"><div><span class="nm">'+esc(r.n)+'</span></div></div>'
     +'<div class="body" style="display:block">'
     +'<div class="kv"><b>材料：</b>'+esc(r.ing)+'</div>'
     +'<div class="kv"><b>作り方：</b>'+esc(r.make)+'</div>'
     +'<div class="fixnote">🍵 '+esc(r.when)+'</div>'
     +(r.cau?'<div class="caution">🔸 '+esc(r.cau)+'</div>':'')
     +'</div></div>';
  }).join("");
}

function startTab(){
  var VALID=["kampo","shoyaku","shokuyo","kou","aroma","tsubo","recipe","sekki"];
  var h=(location.hash||"").replace("#","").split("/")[0];
  if(h==="touyou")h="kampo";
  if(h==="yojo")h="kampo";
  if(VALID.indexOf(h)>=0){go(h);return;}
  var s=state.lastTab||"kampo";
  if(VALID.indexOf(s)<0)s="kampo";
  go(s);
}
window.addEventListener("hashchange",startTab);
document.addEventListener("DOMContentLoaded",startTab);
if(document.readyState!=="loading")startTab();
</script>
